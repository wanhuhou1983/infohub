<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfoHub - 信息汇总</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        bg: '#0f1117',
        surface: '#1a1d27',
        surface2: '#242734',
        border: '#2e3244',
        accent: '#6366f1',
        accent2: '#818cf8',
        muted: '#8b8fa3',
        fg: '#e2e4eb',
      }
    }
  }
}
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');
  body { font-family: 'Noto Sans SC', sans-serif; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #1a1d27; }
  ::-webkit-scrollbar-thumb { background: #2e3244; border-radius: 3px; }
  .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .source-badge { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; font-weight: 500; }
  .fade-in { animation: fadeIn 0.2s ease-in; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .tab-active { color: #818cf8; border-bottom: 2px solid #6366f1; }
  .tab-item { padding: 8px 16px; cursor: pointer; transition: all 0.2s; border-bottom: 2px solid transparent; }
  .tab-item:hover { color: #a5b4fc; }
  .article-card { transition: all 0.15s ease; }
  .article-card:hover { background: #242734; transform: translateX(2px); }
  .star-btn { cursor: pointer; transition: all 0.15s; }
  .star-btn:hover { transform: scale(1.2); }
  .star-btn.starred { color: #fbbf24; }
  .category-chip { cursor: pointer; transition: all 0.15s; }
  .category-chip:hover { background: #2e3244; }
  .category-chip.active { background: #6366f1; color: white; }
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .toast { position: fixed; top: 20px; right: 20px; z-index: 100; padding: 10px 20px; border-radius: 8px; font-size: 14px; animation: slideIn 0.3s ease; }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
</style>
</head>
<body class="bg-bg text-fg min-h-screen">

<!-- 设置模态框 -->
<div id="settingsModal" class="fixed inset-0 z-[200] hidden">
  <div class="absolute inset-0 bg-black/60" onclick="hideSettings()"></div>
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-surface border border-border rounded-2xl shadow-2xl w-[520px] max-h-[80vh] overflow-y-auto">
    <div class="p-6">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-lg font-semibold">⚙️ 设置</h2>
        <button class="text-muted hover:text-fg transition" onclick="hideSettings()">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>

      <!-- WeFlow 配置 -->
      <div class="mb-6">
        <h3 class="text-sm font-medium text-accent2 mb-3 flex items-center gap-2">
          <span>💬</span> WeFlow 公众号配置
        </h3>
        <div class="space-y-3">
          <div>
            <label class="text-xs text-muted block mb-1">WeFlow 服务地址</label>
            <input id="cfgWeflowUrl" type="text" placeholder="http://127.0.0.1:5031"
              class="w-full bg-surface2 border border-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent placeholder-muted">
          </div>
          <div>
            <label class="text-xs text-muted block mb-1">WeFlow Token</label>
            <input id="cfgWeflowToken" type="password" placeholder="输入 WeFlow API Token"
              class="w-full bg-surface2 border border-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent placeholder-muted">
          </div>
          <div>
            <label class="text-xs text-muted block mb-1">每个公众号拉取条数</label>
            <input id="cfgWechatLimit" type="number" min="1" max="50" placeholder="5"
              class="w-full bg-surface2 border border-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent placeholder-muted">
          </div>
          <div>
            <label class="text-xs text-muted block mb-1">公众号名称过滤（逗号分隔，留空=全部）</label>
            <textarea id="cfgWechatAccounts" rows="3" placeholder="例如：老陈侃财,聪明投机者"
              class="w-full bg-surface2 border border-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent placeholder-muted resize-y"></textarea>
          </div>
        </div>
      </div>

      <!-- Miniflux 配置 -->
      <div class="mb-6">
        <h3 class="text-sm font-medium text-accent2 mb-3 flex items-center gap-2">
          <span>📡</span> Miniflux RSS 配置
        </h3>
        <div class="space-y-3">
          <div>
            <label class="text-xs text-muted block mb-1">Miniflux 服务地址</label>
            <input id="cfgMinifluxUrl" type="text" placeholder="http://localhost:8084"
              class="w-full bg-surface2 border border-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent placeholder-muted">
          </div>
          <div>
            <label class="text-xs text-muted block mb-1">用户名</label>
            <input id="cfgMinifluxUser" type="text" placeholder="admin"
              class="w-full bg-surface2 border border-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent placeholder-muted">
          </div>
          <div>
            <label class="text-xs text-muted block mb-1">密码</label>
            <input id="cfgMinifluxPass" type="password" placeholder="输入密码"
              class="w-full bg-surface2 border border-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent placeholder-muted">
          </div>
        </div>
      </div>

      <!-- 图床配置 -->
      <div class="mb-6">
        <h3 class="text-sm font-medium text-accent2 mb-3 flex items-center gap-2">
          <span>🖼️</span> 图床配置
        </h3>
        <div class="space-y-3">
          <div>
            <label class="text-xs text-muted block mb-1">图床 API 地址</label>
            <input id="cfgImgbedUrl" type="text" placeholder="http://localhost:8085/api/"
              class="w-full bg-surface2 border border-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent placeholder-muted">
          </div>
          <div>
            <label class="text-xs text-muted block mb-1">图床 Token</label>
            <input id="cfgImgbedToken" type="password" placeholder="输入图床 Token"
              class="w-full bg-surface2 border border-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent placeholder-muted">
          </div>
        </div>
      </div>

      <div class="flex items-center justify-end gap-3 pt-4 border-t border-border">
        <button class="text-sm text-muted hover:text-fg px-4 py-2 transition" onclick="hideSettings()">取消</button>
        <button class="bg-accent hover:bg-accent2 text-white text-sm px-6 py-2 rounded-lg transition font-medium" onclick="saveSettings()">保存</button>
      </div>
    </div>
  </div>
</div>

<header class="sticky top-0 z-50 bg-surface/95 backdrop-blur-sm border-b border-border">
  <div class="max-w-7xl mx-auto px-4 h-14 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-accent rounded-lg flex items-center justify-center text-white font-bold text-sm">I</div>
      <span class="text-lg font-semibold tracking-tight">InfoHub</span>
      <span class="text-muted text-xs ml-1">信息汇总</span>
    </div>
    <div class="flex-1 max-w-md mx-8">
      <div class="relative">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <input id="searchInput" type="text" placeholder="搜索标题、标签..." class="w-full bg-surface2 border border-border rounded-lg pl-10 pr-4 py-2 text-sm focus:outline-none focus:border-accent placeholder-muted">
      </div>
    </div>
    <div class="flex items-center gap-4 relative">
      <button class="text-muted hover:text-fg transition" title="刷新" onclick="loadArticles()">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
      </button>
      <button id="fetchBtn" class="bg-accent hover:bg-accent2 text-white text-sm px-4 py-1.5 rounded-lg transition font-medium relative" onclick="showFetchMenu()">
        采集
        <svg class="w-3 h-3 inline ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
      </button>
      <button class="text-muted hover:text-fg transition" title="设置" onclick="showSettings()">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      </button>
      <div id="fetchMenu" class="hidden absolute right-4 top-12 bg-surface2 border border-border rounded-lg shadow-xl py-2 min-w-[180px] z-50">
        <div class="px-3 py-1.5 text-xs text-muted font-medium">选择信息源</div>
        <button class="w-full text-left px-3 py-2 text-sm hover:bg-surface transition" onclick="fetchXWLB()">📰 新闻联播</button>
        <button class="w-full text-left px-3 py-2 text-sm hover:bg-surface transition" onclick="fetchRSS()">📡 RSS订阅</button>
        <button class="w-full text-left px-3 py-2 text-sm hover:bg-surface transition" onclick="fetchWechat()">💬 公众号</button>
        <button class="w-full text-left px-3 py-2 text-sm hover:bg-surface transition" onclick="fetchAll()">🔄 全部采集</button>
      </div>
    </div>
  </div>
</header>

<div class="max-w-7xl mx-auto px-4 py-4 flex gap-6">
  <!-- 左侧边栏 -->
  <aside class="w-56 shrink-0">
    <div class="bg-surface rounded-xl p-4 mb-4 border border-border">
      <h3 class="text-xs text-muted uppercase tracking-wider mb-3 font-medium">信息源</h3>
      <div id="sourceList" class="space-y-2"></div>
    </div>
    <div class="bg-surface rounded-xl p-4 border border-border">
      <h3 class="text-xs text-muted uppercase tracking-wider mb-3 font-medium">分类</h3>
      <div id="categoryList" class="flex flex-wrap gap-2"></div>
    </div>
    <div class="bg-surface rounded-xl p-4 border border-border mt-4">
      <h3 class="text-xs text-muted uppercase tracking-wider mb-3 font-medium">今日概览</h3>
      <div class="grid grid-cols-2 gap-3">
        <div class="text-center"><div class="text-2xl font-bold text-accent" id="todayCount">-</div><div class="text-xs text-muted">新文章</div></div>
        <div class="text-center"><div class="text-2xl font-bold text-yellow-400" id="unreadCount">-</div><div class="text-xs text-muted">未读</div></div>
        <div class="text-center"><div class="text-2xl font-bold text-green-400" id="starredCount">-</div><div class="text-xs text-muted">星标</div></div>
        <div class="text-center"><div class="text-2xl font-bold text-blue-400" id="totalCount">-</div><div class="text-xs text-muted">总计</div></div>
      </div>
    </div>
  </aside>

  <!-- 主内容区 -->
  <main id="mainContent" class="flex-1 min-w-0 max-w-2xl">
    <div class="flex items-center border-b border-border mb-4">
      <div class="tab-item tab-active" data-tab="all" onclick="switchTab(this)">全部</div>
      <div class="tab-item text-muted" data-tab="unread" onclick="switchTab(this)">未读</div>
      <div class="tab-item text-muted" data-tab="starred" onclick="switchTab(this)">星标</div>
      <div class="tab-item text-muted" data-tab="today" onclick="switchTab(this)">今日</div>
      <div class="ml-auto text-xs text-muted" id="articleCountLabel"></div>
    </div>
    <div id="articleList" class="space-y-1"></div>
    <div id="loadMore" class="text-center py-4 hidden">
      <button class="text-sm text-accent2 hover:text-accent" onclick="loadMoreArticles()">加载更多</button>
    </div>
  </main>

  <!-- 右侧详情面板 -->
  <aside id="detailPanel" class="flex-1 shrink-0 hidden">
    <div class="bg-surface rounded-xl border border-border sticky top-20 overflow-hidden">
      <div class="p-4 border-b border-border flex items-center justify-between">
        <span class="text-xs text-muted">文章详情</span>
        <button class="text-muted hover:text-fg" onclick="closeDetail()">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="detailContent" class="p-4 max-h-[calc(100vh-8rem)] overflow-y-auto"></div>
    </div>
  </aside>
</div>

<script>
// 动态推断 API 地址：开发环境用同主机:3001，生产环境走反向代理
const API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? `http://${window.location.hostname}:3001/api`
  : '/api';

let currentTab = 'all';
let currentCategory = null;
let currentSourceId = null;
let selectedArticleId = null;
let offset = 0;
const PAGE_SIZE = 30;

const SOURCE_COLORS = {
  xwlb: 'bg-red-500/20 text-red-400',
  rss: 'bg-orange-500/20 text-orange-400',
  wechat: 'bg-green-500/20 text-green-400',
  magazine: 'bg-amber-500/20 text-amber-400',
  tencent: 'bg-blue-500/20 text-blue-400',
  penti: 'bg-purple-500/20 text-purple-400',
  ai: 'bg-cyan-500/20 text-cyan-400',
};

const CATEGORIES = ['全部', '国内', '国际', '财经', '科技', '民生', '人文', '综合'];

// ===== API 调用 =====
async function api(path, opts = {}) {
  const res = await fetch(API + path, opts);
  return res.json();
}

// ===== 加载信息源（树形） =====
let sourceTree = [];
let expandedSources = new Set();

async function loadSources() {
  const tree = await api('/sources/tree');
  sourceTree = tree;
  
  // 统计每个父源的总文章数（含子源）
  const stats = await api('/sync/stats');
  const statsMap = new Map(stats.sources.map(s => [s.id, s]));
  
  const el = document.getElementById('sourceList');
  
  el.innerHTML = tree.map(s => {
    const color = SOURCE_COLORS[s.type] || 'bg-gray-500/20 text-gray-400';
    const active = currentSourceId === s.id ? 'bg-surface2' : '';
    const hasChildren = s.children && s.children.length > 0;
    const isExpanded = expandedSources.has(s.id);
    
    // 计算文章数
    const stat = statsMap.get(s.id);
    let articleCount = stat?.article_count || 0;
    let unreadCount = stat?.unread_count || 0;
    if (hasChildren) {
      for (const child of s.children) {
        const cs = statsMap.get(child.id);
        articleCount += cs?.article_count || 0;
        unreadCount += cs?.unread_count || 0;
      }
    }
    
    let html = `
    <div class="flex items-center gap-2 p-2 rounded-lg cursor-pointer hover:bg-surface2 transition ${active}" onclick="filterBySource(${s.id})">
      ${hasChildren ? `<span class="text-xs text-muted w-3 cursor-pointer select-none" onclick="event.stopPropagation(); toggleSourceExpand(${s.id})">${isExpanded ? '▼' : '▶'}</span>` : '<span class="w-3"></span>'}
      <span class="text-base">${s.icon || '📄'}</span>
      <span class="text-sm flex-1">${s.name}</span>
      ${unreadCount > 0 ? `<span class="text-xs bg-accent/20 text-accent2 px-1.5 py-0.5 rounded">${unreadCount}</span>` : ''}
      <span class="text-xs text-muted">${articleCount}</span>
    </div>`;
    
    // 展开的子源
    if (hasChildren && isExpanded) {
      html += `<div class="ml-5 border-l border-border pl-2 space-y-0.5">`;
      for (const child of s.children) {
        const childActive = currentSourceId === child.id ? 'bg-surface2' : '';
        const cs = statsMap.get(child.id);
        const cCount = cs?.article_count || 0;
        const cUnread = cs?.unread_count || 0;
        html += `
        <div class="flex items-center gap-2 py-1.5 px-2 rounded-md cursor-pointer hover:bg-surface2 transition text-xs ${childActive}" onclick="filterBySource(${child.id})">
          <span class="text-muted flex-1 truncate">${child.name}</span>
          ${cUnread > 0 ? `<span class="text-xs bg-accent/20 text-accent2 px-1 py-0 rounded">${cUnread}</span>` : ''}
          <span class="text-muted">${cCount}</span>
        </div>`;
      }
      html += `</div>`;
    }
    
    return html;
  }).join('');
}

function toggleSourceExpand(id) {
  if (expandedSources.has(id)) {
    expandedSources.delete(id);
  } else {
    expandedSources.add(id);
  }
  loadSources();
}

// ===== 加载分类 =====
function renderCategories() {
  const el = document.getElementById('categoryList');
  el.innerHTML = CATEGORIES.map(c => {
    const active = currentCategory === c || (c === '全部' && !currentCategory) ? 'active' : '';
    return `<span class="category-chip text-xs px-3 py-1.5 rounded-full border border-border ${active}" onclick="filterByCategory('${c}')">${c}</span>`;
  }).join('');
}

// ===== 加载文章 =====
async function loadArticles(reset = true) {
  if (reset) offset = 0;

  let params = [`limit=${PAGE_SIZE}`, `offset=${offset}`];
  if (currentTab === 'unread') params.push('tab=unread');
  else if (currentTab === 'starred') params.push('tab=starred');
  else if (currentTab === 'today') params.push('tab=today');
  if (currentSourceId) params.push(`source_id=${currentSourceId}`);
  if (currentCategory && currentCategory !== '全部') params.push(`category=${currentCategory}`);

  const q = document.getElementById('searchInput').value.trim();
  if (q) params.push(`search=${encodeURIComponent(q)}`);

  const data = await api(`/articles?${params.join('&')}`);
  const articles = data.articles || [];

  const el = document.getElementById('articleList');
  if (reset) el.innerHTML = '';

  if (articles.length === 0 && offset === 0) {
    el.innerHTML = '<div class="text-center text-muted py-16">暂无文章</div>';
    document.getElementById('loadMore').classList.add('hidden');
    return;
  }

  el.innerHTML += articles.map(a => {
    const color = SOURCE_COLORS[a.source_type] || 'bg-gray-500/20 text-gray-400';
    return `
    <div class="article-card p-4 rounded-lg cursor-pointer border border-transparent hover:border-border fade-in ${a.is_read ? 'opacity-60' : ''} ${selectedArticleId === a.id ? 'bg-surface2 border-border' : ''}"
         onclick="selectArticle(${a.id})">
      <div class="flex items-start gap-3">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-1">
            <span class="source-badge ${color}">${a.source_icon || '📄'} ${a.source_name || a.source_type}</span>
            <span class="text-xs text-muted">${a.category || ''}</span>
            <span class="text-xs text-muted ml-auto">${formatTime(a.published_at)}</span>
          </div>
          <h3 class="text-sm font-medium leading-snug mb-1">${a.title}</h3>
          <div class="flex items-center gap-2 mt-2">
            ${(a.tags || []).map(t => `<span class="text-xs text-accent2 bg-accent/10 px-2 py-0.5 rounded">#${t}</span>`).join('')}
          </div>
        </div>
        <div class="flex flex-col items-center gap-2 ml-2">
          <span class="star-btn ${a.is_starred ? 'starred' : 'text-border'}" onclick="event.stopPropagation(); toggleStar(${a.id}, ${a.is_starred})">
            ${a.is_starred ? '★' : '☆'}
          </span>
          ${!a.is_read ? '<span class="w-2 h-2 bg-accent rounded-full"></span>' : ''}
        </div>
      </div>
    </div>`;
  }).join('');

  // 加载更多
  const total = data.total || 0;
  document.getElementById('articleCountLabel').textContent = `共 ${total} 篇`;
  document.getElementById('loadMore').classList.toggle('hidden', offset + PAGE_SIZE >= total);
}

async function loadMoreArticles() {
  offset += PAGE_SIZE;
  await loadArticles(false);
}

// ===== 统计 =====
async function loadStats() {
  const stats = await api('/sync/stats');
  document.getElementById('todayCount').textContent = stats.todayArticles ?? 0;
  document.getElementById('unreadCount').textContent = stats.unreadArticles ?? 0;
  document.getElementById('starredCount').textContent = stats.starredArticles ?? 0;
  document.getElementById('totalCount').textContent = stats.totalArticles ?? 0;
}

// ===== 文章详情 =====
async function selectArticle(id) {
  selectedArticleId = id;
  const article = await api(`/articles/${id}`);

  // 自动标为已读
  if (!article.is_read) {
    await api(`/articles/${id}/read`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ is_read: true }),
    });
  }

  const color = SOURCE_COLORS[article.source_type] || 'bg-gray-500/20 text-gray-400';
  document.getElementById('detailPanel').classList.remove('hidden');
  document.getElementById('mainContent').classList.remove('max-w-2xl');
  document.getElementById('mainContent').classList.add('w-[420px]','shrink-0');
  document.getElementById('detailContent').innerHTML = `
    <div class="mb-4">
      <div class="flex items-center gap-2 mb-3">
        <span class="source-badge ${color}">${article.source_icon || '📄'} ${article.source_name || ''}</span>
        <span class="text-xs text-muted">${article.category || ''}</span>
        <span class="text-xs text-muted">${formatTime(article.published_at)}</span>
      </div>
      <h2 class="text-base font-semibold leading-relaxed mb-3">${article.title}</h2>
      ${article.summary && article.summary !== article.title ? `
      <div class="bg-accent/10 border border-accent/20 rounded-lg p-3 mb-4">
        <div class="flex items-center gap-1.5 mb-1.5">
          <svg class="w-3.5 h-3.5 text-accent2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
          <span class="text-xs font-medium text-accent2">AI 摘要</span>
        </div>
        <p class="text-xs text-fg/80 leading-relaxed">${article.summary}</p>
      </div>` : ''}
    </div>
    <div class="text-sm leading-relaxed text-fg/80">
      ${article.content && article.content.length > 100 ? article.content.split('\n\n').map(p => {
        // 渲染图片标记 __IMG__url__IMG__
        if (p.match(/^__IMG__.*__IMG__$/)) {
          const url = p.replace(/^__IMG__/, '').replace(/__IMG__$/, '');
          return `<div class="mb-3"><img src="${url}" alt="" class="max-w-full rounded-lg border border-border" loading="lazy" onerror="this.style.display='none'"></div>`;
        }
        return `<p class="mb-3">${p}</p>`;
      }).join('') : `
        <div class="bg-surface2 rounded-lg p-6 border border-border text-center">
          <div class="text-4xl mb-3">📄</div>
          <p class="text-muted text-sm mb-4">${article.url && article.url.includes('mp.weixin.qq.com') ? '微信公众号文章需在微信内查看完整内容' : '此文章正文需在原始页面查看'}</p>
          ${article.url ? `<a href="${article.url}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-2 bg-accent hover:bg-accent2 text-white text-sm px-5 py-2.5 rounded-lg transition font-medium">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
            阅读原文
          </a>` : ''}
        </div>
      `}
    </div>
    <div class="flex flex-wrap gap-2 mt-4 pt-4 border-t border-border">
      ${(article.tags || []).map(t => `<span class="text-xs text-accent2 bg-accent/10 px-2 py-1 rounded">#${t}</span>`).join('')}
    </div>
    <div class="flex items-center gap-3 mt-4 pt-4 border-t border-border">
      ${article.url ? `<a href="${article.url}" target="_blank" class="text-xs text-accent2 hover:text-accent transition flex items-center gap-1">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
        原文链接
      </a>` : ''}
    </div>
  `;

  loadArticles(); // 刷新列表的已读状态
  loadStats();
}

// 点击其他区域关闭菜单
document.addEventListener('click', (e) => {
  if (!e.target.closest('#fetchBtn') && !e.target.closest('#fetchMenu')) {
    hideFetchMenu();
  }
});

function showToast(msg, type = 'success') {
  const div = document.createElement('div');
  div.className = `toast ${type === 'success' ? 'bg-green-600' : 'bg-red-600'} text-white`;
  div.textContent = msg;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 3000);
}

function formatTime(str) {
  if (!str) return '';
  const d = new Date(str);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 0) return str.slice(0, 16);
  if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
  if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
  if (diff < 172800) return '昨天';
  return str.slice(0, 10);
}

// ===== 设置面板 =====
let settingsLoaded = false;

async function showSettings() {
  document.getElementById('settingsModal').classList.remove('hidden');
  if (!settingsLoaded) await loadSettings();
}

function hideSettings() {
  document.getElementById('settingsModal').classList.add('hidden');
}

async function loadSettings() {
  try {
    // 从环境配置 API 读取
    const envConfig = await api('/sources/config/env');
    document.getElementById('cfgWeflowUrl').value = envConfig.weflow_url || '';
    document.getElementById('cfgWeflowToken').value = '';  // 安全：不回显 token
    document.getElementById('cfgMinifluxUrl').value = envConfig.miniflux_url || '';
    document.getElementById('cfgMinifluxUser').value = envConfig.miniflux_user || '';
    document.getElementById('cfgMinifluxPass').value = '';
    document.getElementById('cfgImgbedUrl').value = envConfig.imgbed_url || '';
    document.getElementById('cfgImgbedToken').value = '';

    // 公众号过滤列表和条数从数据库源 config 读取
    const sources = await api('/sources');
    const wechat = sources.find(s => s.type === 'wechat' && !s.parent_id);
    if (wechat?.config) {
      document.getElementById('cfgWechatLimit').value = wechat.config.wechat_limit || '';
      document.getElementById('cfgWechatAccounts').value = (wechat.config.wechat_accounts || []).join(', ');
    }

    settingsLoaded = true;
  } catch (e) {
    console.error('加载设置失败:', e);
  }
}

async function saveSettings() {
  try {
    // 1. 保存环境变量配置（WeFlow/Miniflux/图床地址和 Token）
    await api('/sources/config/env', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        weflow_url: document.getElementById('cfgWeflowUrl').value.trim(),
        weflow_token: document.getElementById('cfgWeflowToken').value.trim(),
        miniflux_url: document.getElementById('cfgMinifluxUrl').value.trim(),
        miniflux_user: document.getElementById('cfgMinifluxUser').value.trim(),
        miniflux_pass: document.getElementById('cfgMinifluxPass').value.trim(),
        imgbed_url: document.getElementById('cfgImgbedUrl').value.trim(),
        imgbed_token: document.getElementById('cfgImgbedToken').value.trim(),
      }),
    });

    // 2. 保存公众号过滤列表到数据库源 config
    const sources = await api('/sources');
    const wechat = sources.find(s => s.type === 'wechat' && !s.parent_id);
    if (wechat) {
      const accountsStr = document.getElementById('cfgWechatAccounts').value.trim();
      const accounts = accountsStr ? accountsStr.split(/[,，]/).map(s => s.trim()).filter(Boolean) : [];
      const limitVal = parseInt(document.getElementById('cfgWechatLimit').value) || 5;
      await api(`/sources/${wechat.id}/config`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ wechat_accounts: accounts, wechat_limit: limitVal }),
      });
    }

    showToast('设置已保存', 'success');
    hideSettings();
  } catch (e) {
    showToast(`保存失败：${e}`, 'error');
  }
}
